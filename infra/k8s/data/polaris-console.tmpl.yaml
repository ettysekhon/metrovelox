# Polaris Console — browser UI for the Apache Polaris Iceberg catalog.
#
# The Apache Polaris project publishes no multi-arch container image yet
# (the community georgelza/polaris-console is linux/arm64 only; our GKE
# spot-pool is amd64). We therefore build the console ourselves from the
# upstream source vendored under apps/polaris-console/upstream (git
# submodule of apache/polaris-tools) and push it to our Artifact Registry:
#
#   scripts/build-polaris-console.sh --latest
#
# The upstream Dockerfile already ships a production-ready nginx image
# that generates /config.js at container start from the VITE_* env vars
# below (see console/docker/generate-config.sh).  The SPA prefers that
# runtime config over the build-time import.meta.env values, which means
# a single image can be re-pointed at any Keycloak / Polaris pair just by
# editing the env block — no rebuild needed.
#
# Auth flow:
#   Browser → https://catalog-console.${DOMAIN}
#     → OIDC redirect to auth.${DOMAIN}/realms/openvelox (public client, PKCE)
#     → callback at /auth/callback
#     → console XHRs to https://catalog.${DOMAIN}/api/catalog/v1 with the
#       Keycloak Bearer token; Polaris validates it and answers CORS
#       preflights with Access-Control-Allow-Origin: https://catalog-console.${DOMAIN}
#       (see helm/polaris/values-gke.yaml cors: / advancedConfig).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris-console
  namespace: data
  labels:
    app: polaris-console
    app.kubernetes.io/part-of: openvelox
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polaris-console
  template:
    metadata:
      labels:
        app: polaris-console
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: spot-pool
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: polaris-console
          # Tag format is <upstream-sha7>-<repo-sha7>, bumped by
          # scripts/build-polaris-console.sh.  :latest also exists as a
          # floating pointer but we pin explicitly so ArgoCD can detect
          # new rollouts.
          image: europe-west2-docker.pkg.dev/openvelox-elt-01/openvelox/polaris-console:7d2e4c2-8ed85a1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            # These drive /config.js at pod startup.  Upstream declares
            # ENV defaults only in the builder stage of its Dockerfile,
            # so the nginx stage has no env vars at runtime — we must
            # pass every value we want reaching the SPA explicitly.
            # Hostnames target the prod realm (${DOMAIN}); dev overlays
            # swap via patches.
            - name: VITE_POLARIS_API_URL
              value: "https://catalog.${DOMAIN}"
            - name: VITE_POLARIS_REALM
              value: "POLARIS"
            - name: VITE_POLARIS_PRINCIPAL_SCOPE
              value: "PRINCIPAL_ROLE:ALL"
            - name: VITE_POLARIS_REALM_HEADER_NAME
              value: "Polaris-Realm"
            - name: VITE_OAUTH_TOKEN_URL
              value: "https://catalog.${DOMAIN}/api/catalog/v1/oauth/tokens"
            - name: VITE_OIDC_ISSUER_URL
              value: "https://auth.${DOMAIN}/realms/openvelox"
            - name: VITE_OIDC_CLIENT_ID
              value: "polaris-console"
            - name: VITE_OIDC_REDIRECT_URI
              value: "https://catalog-console.${DOMAIN}/auth/callback"
            - name: VITE_OIDC_SCOPE
              value: "openid profile email"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: polaris-console
  namespace: data
  labels:
    app: polaris-console
    app.kubernetes.io/part-of: openvelox
spec:
  type: ClusterIP
  selector:
    app: polaris-console
  ports:
    - name: http
      port: 80
      targetPort: http
