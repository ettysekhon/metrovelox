# DO NOT EDIT — generated by scripts/render-manifests.sh from infra/k8s/data/opa/opa.tmpl.yaml
# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
# Open Policy Agent (OPA) — external Policy Decision Point for Polaris.
#
# Polaris 1.3+ can delegate authorizable-operation decisions to an external
# HTTP endpoint (see
# https://polaris.apache.org/releases/1.3.0/managing-security/external-pdp/opa/).
# We run one OPA Deployment alongside Polaris in the `data` namespace and
# serve our decision policy (./policies/polaris.rego) as a mounted
# ConfigMap (generated via kustomize configMapGenerator, see sibling
# kustomization.yaml).
#
# Polaris is pointed at `http://opa.data.svc.cluster.local:8181/v1/data/polaris/authz`
# (package-level query — Polaris reads the `allow` field from the result
# document; do NOT include a trailing `/allow` on the policy-uri, that
# returns a boolean Polaris cannot parse and fails closed on).
# To enable/disable enforcement, toggle the `polaris.authorization.*`
# block in helm/polaris/values-gke.tmpl.yaml and roll Polaris.
#
# The policy file is authoritative under policies/polaris.rego; this
# manifest never carries inline Rego. `opa test` in CI (scripts/opa-test.sh)
# validates the same files that ship to the cluster.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: data
  labels:
    app: opa
    app.kubernetes.io/name: opa
    app.kubernetes.io/component: pdp
    app.kubernetes.io/part-of: openvelox
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
        app.kubernetes.io/name: opa
        app.kubernetes.io/component: pdp
      annotations:
        # Force rollout when the generated ConfigMap's hash suffix rotates.
        # Kustomize already rewrites the volume.configMap.name, so just
        # having the configMap as a projected volume is sufficient — but
        # this annotation makes the change visible in `kubectl describe`
        # history for audit.
        policy.openvelox.io/source: "infra/k8s/data/opa/policies/polaris.rego"
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: spot-pool
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      # Spread the two replicas across nodes/zones so a single node
      # eviction (spot-pool is preemptible) can't black-hole Polaris auth.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: opa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: opa
          image: openpolicyagent/opa:0.70.0-static
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server
            - --addr=:8181
            - --diagnostic-addr=:8282
            # A ConfigMap volume exposes the underlying file both at the
            # top level (/policies/polaris.rego) and inside a dot-prefixed
            # timestamped subdir (/policies/..<ts>/polaris.rego, used for
            # atomic rotations by kubelet). Without --ignore, OPA loads
            # both and crashes with
            # "multiple default rules data.polaris.authz.allow found".
            - --ignore=.*
            - --log-level=info
            - --log-format=json
            - --set=decision_logs.console=true
            - /policies
          ports:
            - name: http
              containerPort: 8181
            - name: diagnostic
              containerPort: 8282
          volumeMounts:
            - name: policy
              mountPath: /policies
              readOnly: true
          # The `/health` endpoint on the diagnostic port returns 200 when
          # the process is up; `?bundle=true&plugins=true` is available
          # once we start pulling bundles (not today) and will also assert
          # the latest bundle is activated.
          livenessProbe:
            httpGet:
              path: /health
              port: diagnostic
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: diagnostic
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: policy
          configMap:
            # Name stripped of kustomize hash suffix — kustomize rewrites
            # this at build time to match the configMapGenerator output.
            name: polaris-opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: data
  labels:
    app: opa
    app.kubernetes.io/name: opa
    app.kubernetes.io/part-of: openvelox
spec:
  type: ClusterIP
  selector:
    app: opa
  ports:
    - name: http
      port: 8181
      targetPort: http
    - name: diagnostic
      port: 8282
      targetPort: diagnostic
---
# PodDisruptionBudget — keep at least one replica up during voluntary
# disruptions (node upgrades, spot evictions). Without this, a drain can
# take both OPA pods down simultaneously and black-hole every Polaris
# authorizable operation until a pod re-schedules.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opa
  namespace: data
  labels:
    app: opa
    app.kubernetes.io/part-of: openvelox
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: opa
