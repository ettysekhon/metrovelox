# DO NOT EDIT — generated by scripts/render-manifests.sh from infra/k8s/kafka/base/kafka.tmpl.yaml
# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: openvelox
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # Pin explicitly so upgrades are Renovate-tracked. Must be one of the
    # versions the Strimzi operator ships with — 0.51.0 supports
    # {4.1.0, 4.1.1, 4.2.0}. 4.1.1 is the latest 4.1.x patch at the time
    # of writing. Strimzi Kafka OAuth 0.16.x (the JAR Flink initContainers
    # pull from Maven) works against Kafka 3.x + 4.x clients alike.
    version: 4.1.1
    # replicas / storage / resources are governed by the KafkaNodePool.
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: oauth
          # Browsers and clients exchange tokens at auth.metrovelox.com; the broker
          # validates them against the in-cluster Keycloak JWKS to avoid
          # egressing through the gateway on the hot path.
          validIssuerUri: https://auth.metrovelox.com/realms/openvelox
          jwksEndpointUri: http://keycloak.platform.svc:8080/realms/openvelox/protocol/openid-connect/certs
          userNameClaim: preferred_username
          checkAudience: true
          # Reauthenticate every hour so role-revocation takes effect without
          # killing long-running producers outright.
          maxSecondsWithoutReauthentication: 3600
          # Declared here so Strimzi projects `oauth.client.id` and
          # `oauth.client.secret` into the broker container env; the
          # KeycloakAuthorizer reuses the same credentials to fetch UMA grants
          # from Keycloak. The K8s secret is ESO-synced from Vault
          # (secret/platform/keycloak:kafka-broker-client-secret).
          clientId: kafka-broker
          clientSecret:
            secretName: kafka-broker-oauth
            key: client-secret
    # KeycloakAuthorizer requests UMA permissions for every incoming principal
    # against the `kafka-broker` client's Authorization Services. See
    # infra/terraform/keycloak-realm/main.tf for the role-policy + permission
    # graph.
    authorization:
      type: keycloak
      tokenEndpointUri: http://keycloak.platform.svc:8080/realms/openvelox/protocol/openid-connect/token
      clientId: kafka-broker
      delegateToKafkaAcls: false
      # Bootstrap bypass — kafka-flink has the full producer+consumer roles
      # through Keycloak, but we surface it here so a mis-applied permission
      # mapping during bring-up never blocks the streaming hot path. Tighten
      # in a follow-up once the authz graph is battle-tested.
      superUsers:
        - service-account-kafka-flink
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      # Auto-create is off so every topic has to be declared as a KafkaTopic
      # CR (see base/topics/). This keeps the schema of the stream explicit.
      auto.create.topics.enable: false
    resources:
      requests:
        cpu: 500m
        memory: 1536Mi
      limits:
        cpu: 1500m
        memory: 2Gi
    jvmOptions:
      -Xms: 1g
      -Xmx: 1200m
  # Topic operator reconciles KafkaTopic CRs to real topics on the broker.
  # userOperator is intentionally omitted — OAuth identities replace KafkaUser.
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    template:
      pod:
        tolerations:
          - key: cloud.google.com/gke-spot
            operator: Equal
            value: "true"
            effect: NoSchedule
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: cloud.google.com/gke-nodepool
                      operator: In
                      values:
                        - spot-pool
