apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kafka
resources:
  # Namespace/kafka is managed by the `namespaces` ArgoCD app
  # (infra/k8s/namespaces/namespaces.yaml).  Including it here would
  # trigger a SharedResourceWarning between the namespaces and
  # kafka-cluster apps.
  - kafka-nodepool.yaml
  - kafka.yaml
  - topics/tfl.yaml
