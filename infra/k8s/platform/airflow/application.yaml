# Airflow 3.1.8 — reference only (superseded by ArgoCD Application in argocd/envs/*/airflow.yaml
# using helm/airflow/values-gke.yaml + values-{env}.yaml). Production auth uses KeycloakAuthManager
# from apache-airflow-providers-keycloak, not the embedded webserverConfig below.
#
# Airflow 3.1.8 deployed via ArgoCD + Official Helm Chart
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-airflow
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: openvelox
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: "1.20.0"  # Helm chart version for Airflow 3.x
    helm:
      valuesObject:
        # Airflow version
        airflowVersion: "3.1.8"
        defaultAirflowTag: "3.1.8"
        
        # Executor - KubernetesExecutor for GKE
        executor: KubernetesExecutor
        
        # Webserver configuration
        webserver:
          replicas: 1
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          service:
            type: ClusterIP
          
        # Scheduler configuration
        scheduler:
          replicas: 1
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        
        # Triggerer for async sensors
        triggerer:
          replicas: 1
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
        
        # Disable built-in PostgreSQL (use existing)
        postgresql:
          enabled: false
        
        # External database connection
        data:
          metadataConnection:
            user: airflow
            pass: "${AIRFLOW_DB_PASSWORD}"
            protocol: postgresql
            host: postgresql.platform.svc.cluster.local
            port: 5432
            db: airflow
            sslmode: disable
        
        # DAGs configuration - Git sync from repo
        dags:
          gitSync:
            enabled: true
            repo: "https://github.com/openvelox/airflow-dags.git"
            branch: main
            subPath: "dags"
            wait: 60
        
        # Webserver OAuth configuration (Keycloak SSO)
        webserverConfig: |
          from flask_appbuilder.security.manager import AUTH_OAUTH
          import os
          
          AUTH_TYPE = AUTH_OAUTH
          AUTH_USER_REGISTRATION = True
          AUTH_USER_REGISTRATION_ROLE = "Viewer"
          
          OAUTH_PROVIDERS = [{
              'name': 'keycloak',
              'icon': 'fa-key',
              'token_key': 'access_token',
              'remote_app': {
                  'client_id': 'airflow',
                  'client_secret': os.environ.get('KEYCLOAK_CLIENT_SECRET'),
                  'server_metadata_url': 'https://auth.example.com/realms/openvelox/.well-known/openid-configuration',
                  'api_base_url': 'https://auth.example.com/realms/openvelox/protocol/openid-connect',
                  'client_kwargs': {
                      'scope': 'openid email profile'
                  },
              }
          }]
          
          # Map Keycloak roles to Airflow roles
          AUTH_ROLES_MAPPING = {
              "airflow-admin": ["Admin"],
              "airflow-op": ["Op"],
              "airflow-user": ["User"],
              "airflow-viewer": ["Viewer"],
          }
          AUTH_ROLES_SYNC_AT_LOGIN = True
        
        # Extra environment variables
        extraEnv: |
          - name: AIRFLOW__CORE__LOAD_EXAMPLES
            value: "False"
          - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
            value: "True"
          - name: AIRFLOW__WEBSERVER__RBAC
            value: "True"
          - name: PROJECT_ID
            value: "${PROJECT_ID}"
          - name: GCS_BUCKET
            value: "${PROJECT_ID}-lakehouse"
          - name: _PIP_ADDITIONAL_REQUIREMENTS
            value: "apache-airflow-providers-google>=10.0.0 apache-airflow-providers-common-sql>=1.0.0 apache-airflow-providers-trino>=6.5.0 apache-airflow-providers-cncf-kubernetes>=9.0.0 apache-airflow-providers-apache-kafka>=1.0.0 google-cloud-storage requests"
        
        # Extra secrets for Keycloak
        extraSecrets:
          airflow-keycloak-secret:
            data: |
              KEYCLOAK_CLIENT_SECRET: '{{ .Values.keycloakClientSecret | b64enc }}'
        
        extraEnvFrom: |
          - secretRef:
              name: airflow-keycloak-secret
        
        # GKE Spot VM tolerations
        tolerations:
          - key: "cloud.google.com/gke-spot"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        
        # Service account for Workload Identity
        serviceAccount:
          create: true
          name: airflow
          annotations:
            iam.gke.io/gcp-service-account: airflow-sa@${PROJECT_ID}.iam.gserviceaccount.com
        
        # KubernetesExecutor pod template
        workers:
          tolerations:
            - key: "cloud.google.com/gke-spot"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
        
        # Connections as secrets
        connectionsSecretName: airflow-connections
        
        # Flower disabled (not needed with KubernetesExecutor)
        flower:
          enabled: false
        
        # StatsD for metrics
        statsd:
          enabled: true
        
        # Prometheus metrics
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Airflow connections secret
apiVersion: v1
kind: Secret
metadata:
  name: airflow-connections
  namespace: platform
type: Opaque
stringData:
  # Google Cloud connection
  AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: |
    google-cloud-platform://?extra__google_cloud_platform__project=${PROJECT_ID}
  
  # Slack webhook connection
  AIRFLOW_CONN_SLACK_WEBHOOK: |
    https://:@hooks.slack.com/services/${SLACK_WEBHOOK_PATH}
# Note: Ingress is managed via GKE Gateway API
# See: infra/k8s/gateway/httproutes.yaml (airflow-route)
