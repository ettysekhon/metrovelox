# Keycloak Identity Provider for OpenVelox
# Provides OIDC SSO for: Airflow, ArgoCD, Grafana, MLflow, Frontend
#
# Realm is managed exclusively by Terraform (infra/terraform/keycloak-realm/).
# Do NOT use --import-realm; TF is the sole source of truth for realm config.
#
# Secrets (keycloak-secrets) are created by bootstrap-secrets TF stack.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: platform
  labels:
    app: keycloak
    app.kubernetes.io/part-of: openvelox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.4.7
          args:
            - start
            - --http-enabled=true
            - --hostname-strict=false
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgresql.platform.svc.cluster.local:5432/keycloak
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin-password
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HOSTNAME
              value: "https://auth.example.com"
            - name: KC_HOSTNAME_ADMIN
              value: "https://auth.example.com"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes: []
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: platform
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 9000
      targetPort: 9000
