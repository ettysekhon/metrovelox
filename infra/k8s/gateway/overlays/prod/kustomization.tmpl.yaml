apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - path: patches-gateway.yaml
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: keycloak-route
        namespace: platform
      spec:
        hostnames: ["auth.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: argocd-route
        namespace: argocd
      spec:
        hostnames: ["argocd.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: orchestrator-route
        namespace: batch
      spec:
        hostnames: ["orchestrator.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: query-engine-route
        namespace: data
      spec:
        hostnames: ["query.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: kafka-ui-route
        namespace: kafka
      spec:
        hostnames: ["kafka.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: vault-route
        namespace: security
      spec:
        hostnames: ["vault.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: catalog-route
        namespace: data
      spec:
        hostnames: ["catalog.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: catalog-console-route
        namespace: data
      spec:
        hostnames: ["catalog-console.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: authz-route
        namespace: security
      spec:
        hostnames: ["authz.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: stream-processing-route
        namespace: streaming
      spec:
        hostnames: ["stream-processing.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: grafana-route
        namespace: monitoring
      spec:
        hostnames: ["grafana.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: api-route
        namespace: apps
      spec:
        hostnames: ["api.${DOMAIN}"]
  - patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: frontend-route
        namespace: apps
      spec:
        hostnames: ["${DOMAIN}"]
