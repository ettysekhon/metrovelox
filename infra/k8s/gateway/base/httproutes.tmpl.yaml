# HTTPRoute Definitions for OpenVelox Services
# Replaces individual NGINX Ingress resources
#
# Migration mapping:
#   nginx.ingress.kubernetes.io/backend-protocol  → BackendTLSPolicy
#   nginx.ingress.kubernetes.io/proxy-*           → GCPBackendPolicy.connectionDraining
#   nginx.ingress.kubernetes.io/limit-rps         → GCPBackendPolicy.securityPolicy
#   nginx.ingress.kubernetes.io/rewrite-target    → filters.urlRewrite
---
# ═══════════════════════════════════════════════════════════════════════════════
# KEYCLOAK (auth.example.com)
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  namespace: platform
  labels:
    app: keycloak
    app.kubernetes.io/part-of: openvelox
spec:
  parentRefs:
    - name: openvelox-gateway
      namespace: platform
      sectionName: https
  hostnames:
    - "auth.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak
          port: 8080
---
