# ═══════════════════════════════════════════════════════════════════════════════
# KAFKA UI (kafka.example.com) — kafbat kafka-ui for the Strimzi cluster.
#
# Native Keycloak OIDC + RBAC (no oauth2-proxy) — the kafka-ui client is
# public PKCE and its roles-field is `kafka_ui_roles`. Access to the broker
# is proxied via kafka-ui's SASL OAUTHBEARER session, not the browser token.
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kafka-ui-route
  namespace: kafka
  labels:
    app: kafka-ui
    app.kubernetes.io/part-of: openvelox
spec:
  parentRefs:
    - name: openvelox-gateway
      namespace: platform
      sectionName: https
  hostnames:
    - "kafka.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kafka-ui
          port: 80
---
