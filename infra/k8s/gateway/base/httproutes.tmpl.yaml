# ═══════════════════════════════════════════════════════════════════════════════
# ICEBERG CATALOG (catalog.example.com) — Apache Polaris REST API
#
# Polaris serves the Iceberg REST Catalog API used by Spark, Flink, and Trino.
# Currently uses internal OAuth2 (root creds). When Keycloak is deployed,
# switch to external IDP tokens via polaris.authentication.authenticator.type.
# See: https://polaris.apache.org/guides/keycloak/
#
# Fine-grained authz via OPA is supported as external PDP:
#   polaris.authorization.type=opa
#   polaris.authorization.opa.policy-uri=http://opa.data.svc:8181/v1/data/polaris/authz
# See: https://polaris.apache.org/in-dev/unreleased/managing-security/external-pdp/opa/
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-route
  namespace: data
  labels:
    app: polaris
    app.kubernetes.io/part-of: openvelox
spec:
  parentRefs:
    - name: openvelox-gateway
      namespace: platform
      sectionName: https
  hostnames:
    - "catalog.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: polaris
          port: 8181
---
# ═══════════════════════════════════════════════════════════════════════════════
# POLARIS CONSOLE (catalog-console.example.com) — browser UI for the Polaris
# Iceberg catalog. SPA served by nginx, logs in via Keycloak (public client,
# PKCE), then makes cross-origin XHRs to `catalog.<domain>` with the user's
# bearer token. CORS on the Polaris side is enabled via helm/polaris/values-gke.yaml.
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-console-route
  namespace: data
  labels:
    app: polaris-console
    app.kubernetes.io/part-of: openvelox
spec:
  parentRefs:
    - name: openvelox-gateway
      namespace: platform
      sectionName: https
  hostnames:
    - "catalog-console.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: polaris-console
          port: 80
---
# ═══════════════════════════════════════════════════════════════════════════════
# AUTHORIZATION (authz.example.com) — Open Policy Agent
#
# OPA provides attribute-based access control via Rego policies.
# Polaris delegates authorization decisions to OPA when configured with
# polaris.authorization.type=opa. OPA also serves as a general-purpose
# policy engine for other platform services.
#
# NOT YET DEPLOYED — placeholder route for when OPA is provisioned in the
# security namespace. Deploy OPA via Helm:
#   helm repo add opa https://open-policy-agent.github.io/kube-mgmt/charts
#   helm install opa opa/opa --namespace security
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authz-route
  namespace: security
  labels:
    app: opa
    app.kubernetes.io/part-of: openvelox
spec:
  parentRefs:
    - name: openvelox-gateway
      namespace: platform
      sectionName: https
  hostnames:
    - "authz.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: opa
          port: 8181
---
