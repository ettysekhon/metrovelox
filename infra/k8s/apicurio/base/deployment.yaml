apiVersion: apps/v1
kind: Deployment
metadata:
  name: apicurio-registry
  namespace: kafka
  labels:
    app.kubernetes.io/name: apicurio-registry
    app.kubernetes.io/part-of: openvelox
    openvelox/tier: streaming
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: apicurio-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apicurio-registry
        app.kubernetes.io/part-of: openvelox
    spec:
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cloud.google.com/gke-nodepool
                    operator: In
                    values:
                      - spot-pool
      containers:
        - name: registry
          # Apicurio 3.x auto-detects the SQL backend via APICURIO_STORAGE_KIND.
          # Pin the tag; Renovate owns the upgrade cadence.
          image: quay.io/apicurio/apicurio-registry:3.0.7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APICURIO_STORAGE_KIND
              value: sql
            - name: APICURIO_STORAGE_SQL_KIND
              value: postgresql
            - name: APICURIO_DATASOURCE_URL
              value: jdbc:postgresql://postgresql.platform.svc.cluster.local:5432/apicurio
            - name: APICURIO_DATASOURCE_USERNAME
              value: apicurio
            - name: APICURIO_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apicurio-db-credentials
                  key: db-password
            # Quarkus knobs — tight heap, no dev UI indirection.
            - name: QUARKUS_PROFILE
              value: prod
            - name: QUARKUS_HTTP_PORT
              value: "8080"
            # OIDC on the registry itself is deferred to a follow-up PR; for
            # now the service is namespace-internal only (no ingress).
            - name: APICURIO_AUTH_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
