# ServiceAccounts with Workload Identity annotations.
# The GCP SA email is bound to the K8s SA via Terraform (cluster/main.tf).
# For multi-environment support, override these with an ArgoCD ApplicationSet
# that patches the annotation per cluster, or use Kustomize overlays.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow
  namespace: batch
  annotations:
    iam.gke.io/gcp-service-account: airflow-sa@openvelox-placeholder.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: openvelox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: batch
  annotations:
    iam.gke.io/gcp-service-account: spark-sa@openvelox-placeholder.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: openvelox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: streaming
  annotations:
    iam.gke.io/gcp-service-account: flink-sa@openvelox-placeholder.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: openvelox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spark-operator-batch
  labels:
    app.kubernetes.io/part-of: openvelox
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: batch
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
# The Flink Kubernetes Operator's Helm chart installs a Role `flink` in the
# streaming namespace that grants get/list/watch/create/update/patch/delete
# on pods, configmaps, and deployments — enough for the operator to run the
# JM/TM lifecycle. It does NOT grant `services`, which the Flink Kubernetes
# client needs when a job is submitted from inside a session cluster pod
# (sql-client.sh, CLI, or operator-submitted Jobs): the client resolves its
# own REST endpoint by GETting the `flink-session-rest` Service before
# handing the job off to the JobManager. Without this, sql-client.sh fails
# with `services "flink-session-rest" is forbidden ... user flink`.
#
# Grant the missing verb as a supplemental Role so the chart-managed Role
# stays untouched and can be re-synced without drifting.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-job-submit
  namespace: streaming
  labels:
    app.kubernetes.io/part-of: openvelox
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-job-submit
  namespace: streaming
  labels:
    app.kubernetes.io/part-of: openvelox
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: streaming
roleRef:
  kind: Role
  name: flink-job-submit
  apiGroup: rbac.authorization.k8s.io
