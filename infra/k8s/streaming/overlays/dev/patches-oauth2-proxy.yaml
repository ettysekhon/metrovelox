# DO NOT EDIT — generated by scripts/render-manifests.sh from infra/k8s/streaming/overlays/dev/patches-oauth2-proxy.tmpl.yaml
# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-flink
  namespace: streaming
spec:
  selector:
    matchLabels:
      app: oauth2-proxy-flink
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - --provider=keycloak-oidc
            - --client-id=flink-ui
            - --oidc-issuer-url=https://dev.auth.metrovelox.com/realms/openvelox
            - --login-url=https://dev.auth.metrovelox.com/realms/openvelox/protocol/openid-connect/auth
            - --redeem-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/token
            - --oidc-jwks-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/certs
            - --profile-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/userinfo
            - --redirect-url=https://dev.stream-processing.metrovelox.com/oauth2/callback
            - --upstream=http://flink-session-rest.streaming.svc.cluster.local:8081
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_flink_oauth2
            - --scope=openid email profile
            - --code-challenge-method=S256
            - --reverse-proxy=true
            - --whitelist-domain=.metrovelox.com
