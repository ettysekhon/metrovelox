apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-flink
  namespace: streaming
spec:
  selector:
    matchLabels:
      app: oauth2-proxy-flink
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - --provider=keycloak-oidc
            - --client-id=flink-ui
            - --oidc-issuer-url=https://auth.${DOMAIN}/realms/openvelox
            - --login-url=https://auth.${DOMAIN}/realms/openvelox/protocol/openid-connect/auth
            - --redeem-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/token
            - --oidc-jwks-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/certs
            - --profile-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/userinfo
            - --redirect-url=https://stream-processing.${DOMAIN}/oauth2/callback
            - --upstream=http://flink-session-rest.streaming.svc.cluster.local:8081
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_flink_oauth2
            # `roles` scope carries the realm-roles claim that
            # --allowed-role inspects; without it oauth2-proxy sees
            # an empty roles list and 403s everyone.
            - --scope=openid email profile roles
            - --code-challenge-method=S256
            - --reverse-proxy=true
            - --whitelist-domain=.${DOMAIN}
            # Only Keycloak users with the `streaming-viewer` realm
            # role (granted via the platform-admins / developers /
            # viewers group bindings) may reach the Flink UI.
            - --allowed-role=streaming-viewer
