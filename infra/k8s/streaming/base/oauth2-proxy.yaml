# OAuth2 Proxy for Flink UI — lacks native OIDC so a proxy sits in front
# via Gateway routes.  Secrets managed by ExternalSecret `flink-ui-oauth-secret`.
---
# OAuth2 Proxy for Flink UI — external URLs set by overlay patches
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-flink
  namespace: streaming
  labels:
    app: oauth2-proxy-flink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-flink
  template:
    metadata:
      labels:
        app: oauth2-proxy-flink
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: spot-pool
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
          args:
            - --provider=keycloak-oidc
            - --client-id=flink-ui
            - --oidc-issuer-url=https://auth.DOMAIN/realms/openvelox
            - --login-url=https://auth.DOMAIN/realms/openvelox/protocol/openid-connect/auth
            - --redeem-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/token
            - --oidc-jwks-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/certs
            - --profile-url=http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/userinfo
            - --redirect-url=https://stream-processing.DOMAIN/oauth2/callback
            - --upstream=http://flink-session-rest.streaming.svc.cluster.local:8081
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_flink_oauth2
            # `roles` scope has to be in default_scopes on the Keycloak
            # client (see infra/terraform/keycloak-realm/main.tf) or
            # oauth2-proxy will see an empty roles claim and 403 everyone.
            - --scope=openid email profile roles
            - --code-challenge-method=S256
            # Gateway terminates TLS; trust X-Forwarded-* so redirect_uri is https://
            - --reverse-proxy=true
            - --whitelist-domain=.DOMAIN
            # Flink UI is the streaming control plane — limit to members
            # of the `streaming-viewer` realm-role (operators + developers
            # inherit it via group binding; ordinary users do not).
            - --allowed-role=streaming-viewer
          env:
            - name: OAUTH2_PROXY_ERRORS_TO_INFO_LOG
              value: "true"
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: flink-ui-oauth-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: flink-ui-oauth-secret
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 4180
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-flink
  namespace: streaming
spec:
  selector:
    app: oauth2-proxy-flink
  ports:
    - port: 4180
      targetPort: 4180
      name: http
