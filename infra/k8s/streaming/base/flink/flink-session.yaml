# Flink session cluster via Flink Kubernetes Operator.
# Used for submitting Flink SQL jobs (bronze/silver/gold) interactively.
#
# Usage:
#   kubectl apply -f infra/k8s/streaming/flink/flink-session.yaml
#   kubectl exec -n streaming -it deploy/flink-session -- ./bin/sql-client.sh
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-session
  namespace: streaming
spec:
  # Base image is only used when no overlay overrides it; the prod
  # overlay swaps this for flink-lakehouse:2.2 (Flink 2.0 + lakehouse
  # connectors). Keep the base on a real Flink 2.0 tag so `flinkVersion:
  # v2_0` matches the JARs — Flink 1.x JARs mixed into a 2.x runtime
  # trip a JPMS IllegalAccessError in JobManagerProcessUtils.
  image: flink:2.2.0-java17
  flinkVersion: v2_0
  serviceAccount: flink
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "4"
    state.backend: hashmap
    execution.checkpointing.interval: "60000"
    rest.flamegraph.enabled: "true"
  jobManager:
    resource:
      memory: "2560m"
      cpu: 0.5
  taskManager:
    resource:
      memory: "2560m"
      cpu: 1
  # Strimzi OAUTHBEARER wiring — a copy initContainer stages Flink's
  # built-in /opt/flink/lib/ into a shared emptyDir, then a curl init
  # drops the Strimzi kafka-oauth client + its one runtime dep (gson)
  # alongside. The jobmanager/taskmanager containers mount that emptyDir
  # on top of /opt/flink/lib so the oauth login-callback class is on the
  # system classpath. Flink SQL jobs reference ${KAFKA_BOOTSTRAP} /
  # ${KAFKA_FLINK_CLIENT_ID} / ${KAFKA_FLINK_OAUTH_CLIENT_SECRET} /
  # ${KAFKA_TOKEN_ENDPOINT} in DDL (${…} is interpolated by the SQL
  # planner from the pod env).
  podTemplate:
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: spot-pool
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      volumes:
        - name: flink-lib-overlay
          emptyDir: {}
      initContainers:
        # Seed the shared emptyDir with Flink's own lib/ jars before the
        # OAuth init overlays them. Must be the SAME Flink major version
        # as the main container (the prod overlay uses flink-lakehouse:2.2
        # which is Flink 2.0): mixing 1.x stdlib jars into a 2.0 runtime
        # broke flink-jobmanager with IllegalAccessError on
        # JobManagerProcessUtils.processSpecFromConfig.
        - name: flink-lib-copy
          image: flink:2.2.0-java17
          command:
            - sh
            - -c
            - cp /opt/flink/lib/*.jar /lib-overlay/
          volumeMounts:
            - name: flink-lib-overlay
              mountPath: /lib-overlay
        - name: strimzi-oauth-download
          image: curlimages/curl:8.9.1
          command:
            - sh
            - -c
            - |
              set -eu
              cd /lib-overlay
              # Swap the shaded Kafka SQL connector for the non-shaded one
              # so the Strimzi OAuth login handler (which extends the
              # unshaded org.apache.kafka.common.security.auth.
              # AuthenticateCallbackHandler) can actually be loaded by
              # Kafka clients at SASL negotiation time.
              # flink-sql-connector-kafka-4.0.1-2.0.jar shades kafka-clients
              # into org.apache.flink.kafka.shaded.* — the Strimzi handler
              # then fails with NoClassDefFoundError on the unshaded parent
              # interface.
              rm -f flink-sql-connector-kafka-*.jar
              curl -fSL -o flink-connector-kafka-4.0.1-2.0.jar \
                https://repo1.maven.org/maven2/org/apache/flink/flink-connector-kafka/4.0.1-2.0/flink-connector-kafka-4.0.1-2.0.jar
              # Matching kafka-clients version pulled from the Flink 4.0.1-2.0
              # connector parent pom (kafka.version=3.9.1).
              curl -fSL -o kafka-clients-3.9.1.jar \
                https://repo1.maven.org/maven2/org/apache/kafka/kafka-clients/3.9.1/kafka-clients-3.9.1.jar
              curl -fSL -o kafka-oauth-client-0.16.1.jar \
                https://repo1.maven.org/maven2/io/strimzi/kafka-oauth-client/0.16.1/kafka-oauth-client-0.16.1.jar
              curl -fSL -o kafka-oauth-common-0.16.1.jar \
                https://repo1.maven.org/maven2/io/strimzi/kafka-oauth-common/0.16.1/kafka-oauth-common-0.16.1.jar
              # Strimzi OAuth 0.16.1 runtime deps — without these the
              # JaasClientOauthLoginCallbackHandler loads but dies with
              # NoClassDefFoundError as soon as it posts to the token
              # endpoint. Versions pulled from io.strimzi:oauth:0.16.1
              # parent pom properties (jackson 2.15.3, nimbus 9.37.2,
              # jsonpath 2.9.0, json-smart 2.5.2).
              curl -fSL -o jackson-core-2.15.3.jar \
                https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-core/2.15.3/jackson-core-2.15.3.jar
              curl -fSL -o jackson-databind-2.15.3.jar \
                https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-databind/2.15.3/jackson-databind-2.15.3.jar
              curl -fSL -o jackson-annotations-2.15.3.jar \
                https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-annotations/2.15.3/jackson-annotations-2.15.3.jar
              # flink-shaded-hadoop-2-uber-2.8.3-10.0.jar ships an ancient
              # (2020) shaded copy of com.nimbusds.jose.Payload that pre-dates
              # the toType(PayloadTransformer) method Strimzi's OAuth client
              # calls during token introspection. Flink's launcher enumerates
              # /opt/flink/lib/*.jar alphabetically, so prefix the modern
              # nimbus jar with "aa-" to guarantee it lands on the classpath
              # ahead of flink-shaded-hadoop and wins Class.forName lookups
              # for com/nimbusds/jose/Payload at SASL negotiation time.
              curl -fSL -o aa-nimbus-jose-jwt-9.37.2.jar \
                https://repo1.maven.org/maven2/com/nimbusds/nimbus-jose-jwt/9.37.2/nimbus-jose-jwt-9.37.2.jar
              curl -fSL -o json-path-2.9.0.jar \
                https://repo1.maven.org/maven2/com/jayway/jsonpath/json-path/2.9.0/json-path-2.9.0.jar
              curl -fSL -o json-smart-2.5.2.jar \
                https://repo1.maven.org/maven2/net/minidev/json-smart/2.5.2/json-smart-2.5.2.jar
              curl -fSL -o accessors-smart-2.5.2.jar \
                https://repo1.maven.org/maven2/net/minidev/accessors-smart/2.5.2/accessors-smart-2.5.2.jar
              curl -fSL -o gson-2.10.1.jar \
                https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar
          volumeMounts:
            - name: flink-lib-overlay
              mountPath: /lib-overlay
      containers:
        - name: flink-main-container
          volumeMounts:
            - name: flink-lib-overlay
              mountPath: /opt/flink/lib
          env:
            - name: KAFKA_BOOTSTRAP
              value: openvelox-kafka-bootstrap.kafka.svc.cluster.local:9092
            - name: KAFKA_TOKEN_ENDPOINT
              value: http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/token
            - name: KAFKA_FLINK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-flink-oauth
                  key: client-id
            - name: KAFKA_FLINK_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kafka-flink-oauth
                  key: client-secret
