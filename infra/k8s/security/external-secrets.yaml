---
# Polaris bootstrap secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: polaris-bootstrap-secret
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: polaris-bootstrap-secret
    creationPolicy: Owner
  data:
    - secretKey: root-client-id
      remoteRef:
        key: platform/polaris
        property: root-client-id
    - secretKey: root-client-secret
      remoteRef:
        key: platform/polaris
        property: root-client-secret
---
# Trino → Polaris service-principal credential. Consumed by the Trino
# coordinator (and every worker) as the env var `POLARIS_TRINO_CREDENTIAL`,
# which the Iceberg catalog properties reference as
# `iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_TRINO_CREDENTIAL}`.
#
# The Vault keys below start out seeded with the Polaris root credential
# (see scripts/vault-init.sh) so Trino can connect immediately on a fresh
# cluster. `scripts/polaris-bootstrap-principals.sh` — invoked by
# `scripts/post-deploy.sh` — replaces these with a per-service principal
# minted through Polaris's management API, which has narrower privileges
# (CATALOG_MANAGE_CONTENT on raw/curated/analytics only, no admin).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trino-polaris-credential
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: trino-polaris-credential
    creationPolicy: Owner
    # Iceberg's REST catalog oauth2.credential wants a single "id:secret"
    # string. Build it in the target Secret so the Trino chart can mount
    # it as one env var rather than constructing it at runtime.
    template:
      data:
        credential: "{{ .clientId }}:{{ .clientSecret }}"
  data:
    - secretKey: clientId
      remoteRef:
        key: platform/polaris
        property: trino-client-id
    - secretKey: clientSecret
      remoteRef:
        key: platform/polaris
        property: trino-client-secret
