        property: kafka-flink-client-secret
---
# tfl-producer-strimzi CronJob — narrower service-account client so the
# producer only has kafka-producer (not kafka-admin/kafka-consumer).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
