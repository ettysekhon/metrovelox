  name: kafka-tfl-producer-oauth
  namespace: streaming
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kafka-tfl-producer-oauth
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: platform/keycloak
        property: kafka-tfl-producer-client-id
    - secretKey: client-secret
      remoteRef:
        key: platform/keycloak
        property: kafka-tfl-producer-client-secret
---
# openvelox-api — service-account credentials for the FastAPI backend.
# The same token is used for two upstreams:
#   1. Trino coordinator — presented as `Authorization: Bearer <jwt>` against
#      the JWT authenticator configured in helm/trino/values-gke.yaml.
#   2. Kafka brokers — SASL OAUTHBEARER via aiokafka's token-provider callback
#      in apps/api/app/streaming.py.
# Audience claims on the token are set by Keycloak mappers in
# infra/terraform/keycloak-realm/main.tf (`api_trino_audience`, `api_kafka_audience`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openvelox-api-oauth
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openvelox-api-oauth
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: platform/keycloak
        property: openvelox-api-client-id
    - secretKey: client-secret
      remoteRef:
        key: platform/keycloak
        property: openvelox-api-client-secret
---
# Polaris JDBC persistence secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: polaris-persistence-vault
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: polaris-persistence
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: platform/polaris-persistence
        property: username
    - secretKey: password
      remoteRef:
        key: platform/polaris-persistence
        property: password
    - secretKey: jdbcUrl
      remoteRef:
