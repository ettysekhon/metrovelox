---
# Flink → Strimzi — service-account credentials for the FlinkDeployment
# Kafka source/sink factories. Mounted as KAFKA_FLINK_OAUTH_CLIENT_SECRET.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
