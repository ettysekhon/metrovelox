  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kafka-broker-oauth
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: platform/keycloak
        property: kafka-broker-client-secret
---
# kafbat kafka-ui — mounted as KAFKA_UI_OAUTH_CLIENT_SECRET env var, used
# for both browser OIDC login and proxied SASL OAUTHBEARER to the broker.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
