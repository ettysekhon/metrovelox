# External Secrets — Vault ClusterSecretStore + ExternalSecret CRs
# Syncs platform secrets from Vault KV-v2 into K8s Secrets
# Auth: Kubernetes auth (ServiceAccount JWT), not static root token
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.security.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso
          serviceAccountRef:
            name: external-secrets-operator
            namespace: security
---
# Keycloak OAuth secrets for Airflow
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-oauth-keycloak-vault
  namespace: batch
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: airflow-oauth-keycloak
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_CLIENT_ID
      remoteRef:
        key: platform/keycloak
        property: airflow-client-id
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: platform/keycloak
        property: airflow-client-secret
---
# Postgres password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-password-vault
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: platform/postgres
        property: password
---
# ArgoCD OIDC client secret — MUST land in argocd-secret (key oidc.keycloak.clientSecret).
# Argo CD resolves $oidc.keycloak.clientSecret only from argocd-secret, not a sidecar secret.
# creationPolicy: Merge adds/updates that key without owning the whole secret (Helm/bootstrap).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-vault
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidc.keycloak.clientSecret
      remoteRef:
        key: platform/keycloak
        property: argocd-client-secret
---
# Grafana OAuth secret — keys MUST be Grafana env names (envFrom on Grafana container).
# `client-secret` is ignored by Grafana; it expects GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth-keycloak
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-oauth-keycloak
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: platform/keycloak
        property: grafana-client-secret
---
# Flink UI OAuth2 Proxy secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flink-ui-oauth-secret
  namespace: streaming
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: flink-ui-oauth-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: platform/keycloak
        property: flink-ui-client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: platform/oauth2-proxy
        property: cookie-secret
---
# Trino Keycloak OAuth2 secret — consumed by helm/trino/values-gke.yaml
# (coordinator additionalEnvs TRINO_OAUTH_CLIENT_SECRET). Rotates in lockstep
# with the `trino` Keycloak client (see infra/terraform/keycloak-realm/main.tf).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trino-oauth-secret
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: trino-oauth-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: platform/keycloak
        property: trino-client-secret
---
# ─────────────────────────────────────────────────────────────────────────
# Strimzi Kafka + kafka-ui — OAuth client credentials from Keycloak.
# Seeded into Vault by scripts/post-deploy.sh after the keycloak-realm
# Terraform apply and rotated in lockstep with the matching clients in
# infra/terraform/keycloak-realm/main.tf.
# ─────────────────────────────────────────────────────────────────────────
---
# Strimzi Kafka broker — OAuth client secret used by both the listener
# auth (clientId/clientSecret projected into broker env) and the
# KeycloakAuthorizer's UMA grant fetches.
apiVersion: external-secrets.io/v1
