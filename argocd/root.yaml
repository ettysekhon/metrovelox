# DO NOT EDIT — generated by scripts/render-manifests.sh from argocd/root.tmpl.yaml
# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: openvelox
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ettysekhon/openvelox.git
    targetRevision: main
    path: argocd/envs/prod
    directory:
      recurse: true
      # Templates and their rendered output live side-by-side under
      # argocd/envs/prod/.  Without this exclude, directory.recurse picks
      # up both <app>.tmpl.yaml (pre-render) and <app>.yaml (rendered),
      # registering every child Application twice and triggering
      # RepeatedResourceWarning on every sync.
      exclude: "{*.tmpl.yaml,**/*.tmpl.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
