apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: openvelox
  annotations:
    # Must wait until the Strimzi operator has registered its CRDs. The
    # operator app syncs at wave -5.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
