apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: polaris
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: openvelox
  annotations:
    # Kept in lock-step with argocd/envs/prod/polaris.yaml — Polaris syncs
    # ahead of Trino so the catalog endpoint is live before the coordinator
    # tries to exchange OAuth2 credentials against it.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: polaris
      repoURL: https://downloads.apache.org/polaris/helm-chart
      targetRevision: 1.3.0-incubating
      helm:
        valueFiles:
          - $values/helm/polaris/values-gke.yaml
        # Per-env overrides only. See argocd/envs/prod/polaris.tmpl.yaml
        # for the rationale — the GSA naming / project differs per env,
        # the rest of the values stay shared.
        values: |
          serviceAccount:
            annotations:
              iam.gke.io/gcp-service-account: polaris-sa@openvelox-dev-01.iam.gserviceaccount.com
    - repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
