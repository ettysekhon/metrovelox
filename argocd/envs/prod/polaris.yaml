# DO NOT EDIT — generated by scripts/render-manifests.sh from argocd/envs/prod/polaris.tmpl.yaml
# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: polaris
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: openvelox
  annotations:
    # Polaris syncs before Trino so the REST catalog is up and addressable
    # by the time Trino's Iceberg connector tries to exchange a bearer
    # token against it. Without the wave, Trino's coordinator restarts in
    # a loop while waiting for polaris.data.svc.cluster.local:8181.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: polaris
      repoURL: https://downloads.apache.org/polaris/helm-chart
      targetRevision: 1.3.0-incubating
      helm:
        valueFiles:
          - $values/helm/polaris/values-gke.yaml
        # Per-env overrides only. The Polaris ServiceAccount needs to
        # federate to the `polaris-sa` GSA in *this* project so Iceberg
        # GCSFileIO can write table metadata/data under
        # gs://openvelox-elt-01-lakehouse.  The WI GSA <-> K8s SA binding
        # itself is Terraform-managed (infra/terraform/cluster/main.tf
        # `wif_polaris`).
        values: |
          serviceAccount:
            annotations:
              iam.gke.io/gcp-service-account: polaris-sa@openvelox-elt-01.iam.gserviceaccount.com
    - repoURL: https://github.com/ettysekhon/openvelox.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Server-side apply merges fields server-side rather than stuffing the
      # full manifest into the kubectl.kubernetes.io/last-applied-configuration
      # annotation, which is capped at ~256KB. Polaris's values.yaml renders a
      # ConfigMap of CORS + Quarkus properties that can push past that ceiling
      # as we add catalogs.
      - ServerSideApply=true
      - CreateNamespace=true
