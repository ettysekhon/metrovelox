apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: openvelox
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}.git
    targetRevision: main
    path: infra/k8s/rbac/overlays/prod
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
