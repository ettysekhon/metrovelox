apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trino
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: openvelox
  annotations:
    # Trino follows Polaris (sync-wave -1) so the REST catalog is up before
    # the coordinator tries to exchange a Polaris OAuth2 token on startup.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: trino
      repoURL: https://trinodb.github.io/charts
      # Chart 1.42.1 ships app version 479 (up from 469 in 1.36.0). Diff is
      # purely additive (KEDA, Gateway API support, sessionProperties, header
      # auth); none of the keys we set have renamed or moved.
      targetRevision: 1.42.1
      helm:
        valueFiles:
          - $values/helm/trino/values-gke.yaml
          - $values/helm/trino/values-prod.yaml
    - repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Trino's ConfigMap balloons with every catalog (raw, curated,
      # analytics, plus future additions) and the OPA access-control
      # policy files will push it further. Server-side apply sidesteps
      # the 256KB last-applied-configuration annotation ceiling that
      # client-side kubectl apply hits.
      - ServerSideApply=true
      - CreateNamespace=true
  # HPA / KEDA may rewrite `spec.replicas` on the worker Deployment; without
  # this ignoreDifferences block ArgoCD would flap the app to OutOfSync on
  # every autoscaler event. Harmless today (workers: 0) but future-proofing.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: trino-worker
      jsonPointers:
        - /spec/replicas
