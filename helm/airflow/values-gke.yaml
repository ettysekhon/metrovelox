# DO NOT EDIT — generated by scripts/render-manifests.sh from helm/airflow/values-gke.tmpl.yaml
# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
# Airflow Helm values for OpenVelox GKE deployment
# Chart: apache-airflow/airflow
# Image: docker/airflow/Dockerfile (custom with providers + Trino + Kafka)

# ---------- custom image ----------
# defaultAirflowRepository set per-env in values-{env}.yaml
defaultAirflowTag: "3.1.8-custom-v3"

# After rebuilding for linux/amd64 on Apple Silicon, nodes may still cache an old
# arm64 layer for the same tag (chart default is IfNotPresent). Always pull.
images:
  airflow:
    pullPolicy: Always

executor: KubernetesExecutor

# ---------- KubernetesExecutor pod resources ----------
workers:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

# ---------- metadata db (external PostgreSQL in platform ns) ----------
postgresql:
  enabled: false
data:
  metadataSecretName: airflow-metadata

# ---------- DAGs via GitDagBundle (Airflow 3 native) ----------
# No git-sync sidecar needed. The dag-processor clones the repo itself.
# Private repo — uses git_conn_id for authentication via GitHub PAT.
# The connection URI is set via AIRFLOW_CONN_GITHUB_DEFAULT env var below.
dagProcessor:
  dagBundleConfigList:
    - name: openvelox-tfl
      classpath: "airflow.providers.git.bundles.git.GitDagBundle"
      kwargs:
        repo_url: "https://github.com/ettysekhon/openvelox.git"
        subdir: "pipelines/tfl/dags"
        tracking_ref: "main"
        refresh_interval: 60
        git_conn_id: "github_default"
    - name: openvelox-platform
      classpath: "airflow.providers.git.bundles.git.GitDagBundle"
      kwargs:
        repo_url: "https://github.com/ettysekhon/openvelox.git"
        subdir: "platform/dags"
        tracking_ref: "main"
        refresh_interval: 300
        git_conn_id: "github_default"

# ---------- DAG processor config ----------
config:
  webserver:
    enable_proxy_fix: 'True'
    proxy_fix_x_for: 1
    proxy_fix_x_proto: 1
    proxy_fix_x_host: 1
  dag_processor:
    refresh_interval: "30"

# ---------- connections + Keycloak env vars ----------
# env: block set per-env in values-{env}.yaml (PROJECT_ID, GCS_BUCKET, KEYCLOAK_*, etc.)

# Chart `env:` only allows name+value (schema). Use this block for valueFrom / secretKeyRef.
extraEnv: |-
  - name: AIRFLOW_CONN_GITHUB_DEFAULT
    valueFrom:
      secretKeyRef:
        name: airflow-github-pat
        key: conn_uri
  - name: AIRFLOW__KEYCLOAK_AUTH_MANAGER__CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: airflow-oauth-keycloak
        key: KEYCLOAK_CLIENT_SECRET

extraEnvFrom: |-
  - secretRef:
      name: 'airflow-oauth-keycloak'

# ---------- spot node scheduling ----------
nodeSelector:
  cloud.google.com/gke-nodepool: spot-pool
tolerations:
  - key: cloud.google.com/gke-spot
    operator: Equal
    value: "true"
    effect: NoSchedule

# ---------- API server probes (slow startup on spot nodes) ----------
# Auth: apache-airflow-providers-keycloak KeycloakAuthManager (env in values-{env}.yaml).
# No apiServerConfig — native provider handles browser SSO + /auth/token API JWT.
apiServer:
  startupProbe:
    failureThreshold: 12
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    timeoutSeconds: 10
    failureThreshold: 5
    periodSeconds: 20
    scheme: HTTP
  readinessProbe:
    initialDelaySeconds: 20
    timeoutSeconds: 10
    failureThreshold: 5
    periodSeconds: 20
    scheme: HTTP

# ---------- migration check ----------
waitForMigrations:
  enabled: false

# ---------- disable local user creation (SSO via KeycloakAuthManager) ----------
createUserJob:
  enabled: false

# ---------- triggerer ----------
triggerer:
  persistence:
    enabled: false
