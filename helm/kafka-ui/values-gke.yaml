# DO NOT EDIT — generated by scripts/render-manifests.sh from helm/kafka-ui/values-gke.tmpl.yaml
# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
# Kafbat kafka-ui — Strimzi + Keycloak OIDC + RBAC.
#
# Chart: https://github.com/kafbat/helm-charts/tree/main/charts/kafka-ui
# Docs:  https://ui.docs.kafbat.io/
#
# Shape of this config:
#   - kafka-ui proxies the browser user's SASL OAUTHBEARER session to the
#     Strimzi broker using its own `kafka-ui` Keycloak client_credentials
#     (the clientId/clientSecret below).
#   - The browser signs in via Keycloak OIDC authorization-code (PKCE not
#     required because Spring Security handles the public client on behalf
#     of the browser — the Keycloak client itself is public).
#   - UI actions are gated by the `kafka_ui_roles` claim → rbac.roles below.

replicaCount: 1

image:
  tag: v1.3.0

# Scheduling — share the spot pool with the rest of the Strimzi stack.
tolerations:
  - key: cloud.google.com/gke-spot
    operator: Equal
    value: "true"
    effect: NoSchedule
nodeSelector:
  cloud.google.com/gke-nodepool: spot-pool

resources:
  requests:
    # GCE regional CPU quota is currently capped at the 3-node spot pool
    # ceiling so there's ~400Mi of free memory on the sole spot node —
    # we have to squeeze. Xmx is set via env below to stay under the
    # limit.
    cpu: 100m
    memory: 320Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Cap the JVM heap so it respects the memory limit instead of using the
# Spring Boot default (~60% of cgroup limit = ~300Mi, which leaves no
# headroom for Netty direct buffers and off-heap Kafka clients and OOM-
# kills the pod under load). The kafbat chart expects `env` as a list
# of name/value maps (rendered via `toYaml` into `containers.env`).
env:
  - name: JAVA_OPTS
    value: "-Xms128m -Xmx256m -XX:MaxDirectMemorySize=64m"

# kafka-ui on spot takes ~120s to warm up (Spring Boot + reactor netty +
# kafka AdminClient init on CPU-limited spot nodes). The chart's default
# liveness probe (60s initial, 30s period, 3 fail) triggers before the
# app reaches the OAUTHBEARER login callback and kills the container. A
# startup probe with a long failure window gives the JVM time to warm
# up before liveness kicks in.
livenessProbe:
  initialDelaySeconds: 180
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5
readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 20

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# The `kafka-ui-oauth` secret below is ESO-synced from Vault; its
# `client-secret` key lands as the KAFKA_UI_OAUTH_CLIENT_SECRET env var
# which Spring Boot dereferences via `${}` interpolation inside
# yamlApplicationConfig. The kafbat chart uses `envs.secretMappings` for
# existing-Secret env injection (`envs.secret` inlines literal values
# into a chart-managed Secret, which is not what we want for ESO).
envs:
  secretMappings:
    KAFKA_UI_OAUTH_CLIENT_SECRET:
      name: kafka-ui-oauth
      keyName: client-secret

yamlApplicationConfig:
  kafka:
    clusters:
      - name: openvelox
        bootstrapServers: openvelox-kafka-bootstrap.kafka.svc:9092
        properties:
          security.protocol: SASL_PLAINTEXT
          sasl.mechanism: OAUTHBEARER
          # Kafka's native OAuth handler (KIP-768, stdlib since 3.3) is
          # preferred over Strimzi's Jaas*Handler — the Strimzi client
          # JAR is not on the kafbat image classpath and Spring Boot's
          # JarLauncher makes adding arbitrary libs awkward. Server side
          # is still Strimzi's broker listener + KeycloakAuthorizer; the
          # wire format is bog-standard SASL OAUTHBEARER so interop
          # works.
          sasl.login.callback.handler.class: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler
          sasl.oauthbearer.token.endpoint.url: http://keycloak.platform.svc:8080/realms/openvelox/protocol/openid-connect/token
          sasl.jaas.config: |
            org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId="kafka-ui" clientSecret="${KAFKA_UI_OAUTH_CLIENT_SECRET}" scope="openid" ;
        # Apicurio integration — deferred, but the endpoint is already
        # reachable from the pod network.
        schemaRegistry: http://apicurio-registry.kafka.svc:8080/apis/registry/v2
  auth:
    type: OAUTH2
    oauth2:
      client:
        keycloak:
          provider: keycloak
          clientId: kafka-ui
          clientSecret: ${KAFKA_UI_OAUTH_CLIENT_SECRET}
          scope:
            - openid
            - profile
            - email
            - roles
          client-name: Keycloak
          issuer-uri: https://auth.metrovelox.com/realms/openvelox
          # Spring Security's default principal-name attribute is `sub`,
          # which in Keycloak is an opaque UUID and makes the header
          # unreadable ("9906a481-71eb-..."). `preferred_username` is
          # set on every realm user and is what the admin console shows.
          user-name-attribute: preferred_username
          # Role provider — kafbat looks up the `kafka_ui_roles` claim from
          # the ID token issued by Keycloak (mapper `kafka-ui-roles` in the
          # keycloak-realm Terraform).
          custom-params:
            type: oauth
            roles-field: kafka_ui_roles
  rbac:
    roles:
      # Full admin — platform-admins group inherits kafka-admin.
      - name: admins
        subjects:
          - provider: oauth
            type: role
            value: kafka-admin
        clusters:
          - openvelox
        permissions:
          - resource: applicationconfig
            actions: [all]
          - resource: clusterconfig
            actions: [all]
          - resource: topic
            actions: [all]
            value: ".*"
          - resource: consumer
            actions: [all]
            value: ".*"
          - resource: schema
            actions: [all]
            value: ".*"
          - resource: connect
            actions: [all]
          - resource: ksql
            actions: [all]
          - resource: acl
            actions: [all]
      # Producer — developers group. Write + view on tfl.* and inspection
      # on everything else.
      - name: producer
        subjects:
          - provider: oauth
            type: role
            value: kafka-producer
        clusters:
          - openvelox
        permissions:
          - resource: topic
            actions: [view, create, messages_produce, messages_read]
            value: "tfl\\..*"
          - resource: topic
            actions: [view]
            value: ".*"
          - resource: consumer
            actions: [view]
            value: ".*"
          - resource: schema
            actions: [view, edit, create]
            value: ".*"
      # Read-only — viewers group + anyone with kafka-viewer.
      - name: readonly
        subjects:
          - provider: oauth
            type: role
            value: kafka-viewer
        clusters:
          - openvelox
        permissions:
          - resource: topic
            actions: [view, messages_read]
            value: ".*"
          - resource: consumer
            actions: [view]
            value: ".*"
          - resource: schema
            actions: [view]
            value: ".*"

# kafbat publishes a Prometheus /actuator/prometheus endpoint by default.
# Scrape config added in a follow-up PR — the kube-prometheus-stack chart
# needs a ServiceMonitor selector update first.
