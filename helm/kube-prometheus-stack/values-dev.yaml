# Source of truth: edit the .tmpl.yaml then run scripts/render-manifests.sh
# Development environment overrides — layered on top of values-gke.yaml
grafana:
  grafana.ini:
    server:
      root_url: https://dev.grafana.metrovelox.com
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      client_id: grafana
      scopes: openid email profile
      auth_url: https://dev.auth.metrovelox.com/realms/openvelox/protocol/openid-connect/auth
      token_url: http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/token
      api_url: http://keycloak.platform.svc.cluster.local:8080/realms/openvelox/protocol/openid-connect/userinfo
      role_attribute_path: "contains(roles[*], 'grafana-admin') && 'Admin' || contains(roles[*], 'grafana-editor') && 'Editor' || 'Viewer'"
      role_attribute_strict: false
  envFromSecret: grafana-oauth-keycloak
