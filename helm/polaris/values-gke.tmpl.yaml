# Apache Polaris — GKE values (dev)
#
# Iceberg REST catalog with full POST/PUT support.
# Backend: PostgreSQL (shared cluster instance).
# Auth: internal with fixed root credentials (dev only).
#
# Replaces Unity Catalog OSS which lacked Iceberg write endpoints.

image:
  tag: "1.3.0-incubating"
  pullPolicy: IfNotPresent

persistence:
  type: relational-jdbc
  relationalJdbc:
    secret:
      name: polaris-persistence
      username: username
      password: password
      jdbcUrl: jdbcUrl

# Fixed root credentials for dev. In production use Keycloak OIDC.
extraEnv:
  - name: POLARIS_BOOTSTRAP_DEFAULT-REALM_ROOT_CLIENT_ID
    value: "root"
  - name: POLARIS_BOOTSTRAP_DEFAULT-REALM_ROOT_CLIENT_SECRET
    value: "polaris-root-secret"

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "500m"

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 6

nodeSelector:
  cloud.google.com/gke-nodepool: spot-pool

tolerations:
  - key: cloud.google.com/gke-spot
    operator: Equal
    value: "true"
    effect: NoSchedule

# CORS — the Polaris Console SPA lives at a sibling subdomain
# (catalog-console.<DOMAIN>) so all catalog API calls from the browser are
# cross-origin. Without these headers the browser blocks every XHR with
# "CORS header Access-Control-Allow-Origin missing". The Console sends the
# user's Keycloak bearer token in `Authorization`, plus the `Polaris-Realm`
# and `X-Request-ID` custom headers, so both must be in allowedHeaders.
#
# See: https://github.com/apache/polaris-tools/blob/main/console/README.md#server-side-cors-configuration
# Hostnames here target the **prod** realm; dev ArgoCD apps override
# cors.allowedOrigins via a dev values file if/when one is added.
cors:
  allowedOrigins:
    - "https://catalog-console.${DOMAIN}"
  allowedMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowedHeaders:
    - Content-Type
    - Authorization
    - Polaris-Realm
    - X-Request-ID
  exposedHeaders:
    - "*"
  accessControlMaxAge: "PT10M"
  accessControlAllowCredentials: true

# Belt-and-braces — some Polaris 1.x chart versions don't template the `cors:`
# block above into Quarkus props; set the underlying Quarkus keys directly
# so the runtime always agrees.
#
# This block also carries the external OIDC wiring (Keycloak) — see the
# "External authentication" comment further down for the design.
advancedConfig:
  quarkus.http.cors.enabled: "true"
  quarkus.http.cors.origins: "https://catalog-console.${DOMAIN}"
  quarkus.http.cors.methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  quarkus.http.cors.headers: "Content-Type,Authorization,Polaris-Realm,X-Request-ID"
  quarkus.http.cors.exposed-headers: "*"
  quarkus.http.cors.access-control-max-age: "PT10M"
  quarkus.http.cors.access-control-allow-credentials: "true"

  # ─────────────────────────────────────────────────────────────────────
  # External authentication — Keycloak OIDC (mixed mode)
  # ─────────────────────────────────────────────────────────────────────
  # Polaris 1.3 supports three auth modes: `internal` (default), `external`,
  # and `mixed`. `mixed` tries the internal token path first and falls
  # back to OIDC — which keeps the bootstrap `root` client-credential and
  # the `trino` service principal working unchanged (they continue to hit
  # POST /api/catalog/v1/oauth/tokens), while ALSO accepting Keycloak-issued
  # JWTs from the browser console and any future human user.
  #
  # Spec: https://polaris.apache.org/releases/1.3.0/managing-security/external-idp/
  polaris.authentication.type: "mixed"
  polaris.authentication.authenticator.type: "default"
  polaris.authentication.token-service.type: "default"
  polaris.authentication.token-broker.type: "rsa-key-pair"

  # Quarkus OIDC tenant — Polaris is a pure resource server: it fetches the
  # JWKS from Keycloak and validates tokens locally. `client-id` is matched
  # against the JWT's `aud` claim (populated by the audience protocol mapper
  # on the polaris-console Keycloak client — see
  # infra/terraform/keycloak-realm/main.tf `polaris_console_aud`).
  quarkus.oidc.tenant-enabled: "true"
  quarkus.oidc.auth-server-url: "https://auth.${DOMAIN}/realms/openvelox"
  quarkus.oidc.client-id: "polaris-server"
  quarkus.oidc.application-type: "service"

  # Where Quarkus looks for role names in the JWT. Keycloak emits ALL realm
  # roles under the nested `polaris.roles` claim via the `polaris-roles`
  # protocol mapper; the Polaris-side filter below selects only polaris-*
  # ones and rewrites them into the canonical PRINCIPAL_ROLE:<name> form.
  quarkus.oidc.roles.role-claim-path: "polaris/roles"

  # Principal mapping — Polaris's default PrincipalMapper resolves a token
  # to a Principal by looking up (numeric id + string name) in
  # polaris_schema.entities. Both claims MUST match a row written to the
  # metastore by scripts/polaris-bootstrap-human-principals.sh, which also
  # syncs the Polaris-assigned numeric id back to Keycloak as the
  # `polaris_principal_id` user attribute.
  polaris.oidc.principal-mapper.type: "default"
  polaris.oidc.principal-mapper.id-claim-path: "polaris/principal_id"
  polaris.oidc.principal-mapper.name-claim-path: "polaris/principal_name"

  # Role mapping — transform Keycloak realm roles into Polaris principal
  # roles. Non-polaris-* realm roles are dropped by the filter; remaining
  # ones are rewritten by the ordered mapping list (first match wins per
  # role):
  #
  #   polaris-admin  -> PRINCIPAL_ROLE:service_admin
  #   polaris-viewer -> PRINCIPAL_ROLE:polaris_viewer
  #
  # We re-use the built-in `service_admin` principal-role for admins
  # because Polaris 1.3 does not expose a management API to grant
  # service-level privileges (LIST_CATALOGS, PRINCIPAL_LIST, ...) to
  # arbitrary principal-roles — service_admin is the only role that
  # ships with those grants bound. The `polaris_viewer` role is created
  # by scripts/polaris-bootstrap-human-principals.sh and is reserved for
  # future per-catalog read-only grants.
  polaris.oidc.principal-roles-mapper.type: "default"
  polaris.oidc.principal-roles-mapper.filter: "polaris-.*"
  "polaris.oidc.principal-roles-mapper.mappings[0].regex": "polaris-admin"
  "polaris.oidc.principal-roles-mapper.mappings[0].replacement": "PRINCIPAL_ROLE:service_admin"
  "polaris.oidc.principal-roles-mapper.mappings[1].regex": "polaris-viewer"
  "polaris.oidc.principal-roles-mapper.mappings[1].replacement": "PRINCIPAL_ROLE:polaris_viewer"

  # NOTE on replicas: we run 1 Polaris pod, so the default randomly-generated
  # RSA key pair for the internal token broker is fine. If we ever scale
  # beyond 1 replica, this must be replaced with a shared key pair mounted
  # from a Kubernetes Secret (see
  # https://polaris.apache.org/releases/1.3.0/configuring-polaris-for-production/#configure-oauth2).

  # ─────────────────────────────────────────────────────────────────────
  # External authorization — Open Policy Agent (preview, ENFORCING)
  # ─────────────────────────────────────────────────────────────────────
  # Polaris 1.3+ delegates every authorizable-operation check to the OPA
  # Deployment at infra/k8s/data/opa/. The Rego policy
  # (./policies/polaris.rego) is default-deny with explicit allow rules
  # per principal-role (service_admin, trino_service, polaris_viewer)
  # and scoped to the raw/curated/analytics warehouses. Unit tests live
  # alongside the policy and run on every PR via the `opa-test` GitHub
  # Action in .github/workflows/ci.yaml.
  #
  # Per the upstream "Important Policy Considerations" note
  # (https://polaris.apache.org/releases/1.3.0/managing-security/external-pdp/opa/)
  # privilege-management ops (ADD_*_GRANT_TO_*, CREATE_PRINCIPAL,
  # CREATE_POLICY, ...) are intentionally denied by the Rego and must
  # remain so. Operator flow for adding a new principal after
  # enforcement is on:
  #   1. `scripts/tf-apply.sh`-equivalent: comment these three lines,
  #      render, push, wait for ArgoCD to roll Polaris.
  #   2. Run `scripts/polaris-bootstrap-*.sh`.
  #   3. Un-comment the three lines, render, push, re-enable.
  #
  # Rollback to native Polaris RBAC: same as step 1 above; all existing
  # grants installed by the bootstrap scripts are still in the metastore
  # and kick in immediately.
  polaris.authorization.type: "opa"
  # NB: endpoint is the package path (no /allow suffix). Polaris queries
  # the whole `polaris.authz` document and reads the `allow` boolean from
  # it. If you use the rule-level URI (.../authz/allow) OPA returns
  # {"result": true|false} but Polaris can't find .allow and fails closed.
  polaris.authorization.opa.policy-uri: "http://opa.data.svc.cluster.local:8181/v1/data/polaris/authz"
  polaris.authorization.opa.http.timeout: "PT2S"
