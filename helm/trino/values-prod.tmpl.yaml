# Production environment overrides — layered on top of values-gke.yaml
#
# The Keycloak OAuth2 config in values-gke.yaml already targets the prod
# Keycloak (auth.${DOMAIN}) and the prod coordinator host (query.${DOMAIN}),
# so no `additionalConfigProperties` override is needed here.
# Polaris credential comes from the POLARIS_TRINO_CREDENTIAL env var
# (values-gke.yaml env:), synced from Vault via the `trino-polaris-credential`
# ExternalSecret. See values-dev.yaml header for the rotation story.
#
# GCS auth model:
#
#   `gcs.auth-type=APPLICATION_DEFAULT` (added in Trino 477) tells the native
#   GCS filesystem to resolve credentials via Application Default Credentials.
#   On GKE that flows through `gke-metadata-server` to the Workload Identity
#   binding on the `trino` K8s ServiceAccount
#   (`trino-sa@...iam.gserviceaccount.com`, see infra/terraform/foundation/iam.tf
#   and cluster/main.tf `wif_trino`).
#
#   The default `gcs.auth-type=SERVICE_ACCOUNT` *requires* `gcs.json-key` or
#   `gcs.json-key-file-path` (GcsServiceAccountAuthConfig.authMethodValid) —
#   there is no implicit ADC fallback in that mode.
#
# Why NOT `iceberg.rest-catalog.vended-credentials-enabled=true` and
# `gcs.use-access-token=true`:
#
#   Polaris vends short-lived GCS OAuth2 bearer tokens via the
#   `X-Iceberg-Access-Delegation: vended-credentials` header, which would be
#   the ideal scoped-down data-plane auth. But Trino 479 routes tokens sourced
#   from either Polaris vending or `gcs.use-access-token=true` through
#   `GcsAccessTokenAuth.setAuth()` → `GoogleCredentials.fromStream()`, which
#   expects a service-account JSON blob, not a raw `ya29.dr.*` bearer. Every
#   read then fails with the opaque
#   `io.trino.spi.TrinoException: Error processing metadata for table X`
#   wrapping `java.lang.IllegalArgumentException: no JSON input found`.
#   Until that's fixed upstream we rely on Workload Identity for the data plane
#   and keep Polaris enforcing metadata-plane RBAC (CATALOG_MANAGE_CONTENT via
#   `trino-polaris-credential`).
serviceAccount:
  create: true
  name: trino
  annotations:
    iam.gke.io/gcp-service-account: "trino-sa@openvelox-elt-01.iam.gserviceaccount.com"

additionalCatalogs:
  raw: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.data.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=raw
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_TRINO_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    fs.native-gcs.enabled=true
    gcs.auth-type=APPLICATION_DEFAULT
    gcs.project-id=openvelox-elt-01
  curated: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.data.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=curated
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_TRINO_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    fs.native-gcs.enabled=true
    gcs.auth-type=APPLICATION_DEFAULT
    gcs.project-id=openvelox-elt-01
  analytics: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.data.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=analytics
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_TRINO_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    fs.native-gcs.enabled=true
    gcs.auth-type=APPLICATION_DEFAULT
    gcs.project-id=openvelox-elt-01
