# Trino — GKE values (coordinator-only for dev)
#
# Runs a SINGLE coordinator pod that also executes queries.
# No separate worker pod → halves resource usage on the spot node.
#
# Chart hardcodes -XX:ReservedCodeCacheSize=512M in jvm.config.
# 1G heap + 512M code cache ≈ 2G JVM floor — limit set to 4Gi for
# metaspace, threads, direct buffers and headroom.

server:
  workers: 0
  config:
    query:
      maxMemory: "1GB"

# Coordinator auth: Keycloak native OAuth2 (UI + CLI `--external-authentication`
# + JDBC OAuth2TokenProvider). Tokens are validated directly by the coordinator
# against Keycloak's JWKS; no oauth2-proxy in the path. See:
#   docs/GOVERNANCE_IDENTITY_AND_ACCESS.md  — identity architecture
#   infra/terraform/keycloak-realm/main.tf  — `trino` client (CONFIDENTIAL)
#
# Hostnames here target the **prod** realm (${DOMAIN}). Dev environments
# override this entire list in values-dev.yaml because Helm list-merge is
# replace (not append).
#
# Trino's oauth2 authenticator only needs the issuer URL; it discovers
# auth / token / jwks / userinfo endpoints via /.well-known/openid-configuration.
# Passing explicit *-url properties makes the coordinator fail to start with
# "Configuration property ... was not used".
additionalConfigProperties:
  - "http-server.process-forwarded=true"
  # Trino otherwise refuses any authenticator over plain HTTP. Intra-cluster
  # service-to-service traffic (openvelox-api → trino.data:8080) bypasses the
  # ingress so there is no X-Forwarded-Proto header to trust. TLS is still
  # enforced for *external* access via the gateway, which terminates HTTPS.
  - "http-server.authentication.allow-insecure-over-http=true"
  # Two authenticators in fall-through order:
  #   1. jwt   — headless clients (openvelox-api, CI, dbt) present a pre-fetched
  #              Keycloak access token as `Authorization: Bearer <jwt>`. Trino
  #              validates it against the realm's JWKS and checks `aud=trino`.
  #              Faster than oauth2 because no discovery / cookie handshake.
  #   2. oauth2 — browser UI + CLI `--external-authentication` fall through to
  #              the interactive flow when no Bearer header is present.
  # Both point at the same Keycloak issuer, so rotations stay in one place.
  - "http-server.authentication.type=jwt,oauth2"
  - "http-server.authentication.jwt.key-file=https://auth.${DOMAIN}/realms/openvelox/protocol/openid-connect/certs"
  - "http-server.authentication.jwt.required-audience=trino"
  - "http-server.authentication.jwt.principal-field=preferred_username"
  - "http-server.authentication.oauth2.issuer=https://auth.${DOMAIN}/realms/openvelox"
  - "http-server.authentication.oauth2.client-id=trino"
  - "http-server.authentication.oauth2.client-secret=${ENV:TRINO_OAUTH_CLIENT_SECRET}"
  - "http-server.authentication.oauth2.principal-field=preferred_username"
  - "http-server.authentication.oauth2.scopes=openid,profile,email"
  - "web-ui.authentication.type=oauth2"
  # Required when Web UI auth is enabled; signs UI session cookies and — in
  # a multi-node cluster — internal coordinator↔worker traffic. Reused from
  # the Keycloak client secret so rotation stays in one place.
  - "internal-communication.shared-secret=${ENV:TRINO_OAUTH_CLIENT_SECRET}"

# Inject the Keycloak OAuth2 client secret for every Trino pod. The chart
# mounts `env` (top-level list) into both coordinator and worker templates;
# there is no `coordinator.additionalEnvs` key in trino 1.36.0. The
# `${ENV:TRINO_OAUTH_CLIENT_SECRET}` placeholder in additionalConfigProperties
# is resolved from this variable at startup.
env:
  - name: TRINO_OAUTH_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: trino-oauth-secret
        key: client-secret
  # Polaris REST catalog credential used by every `additionalCatalogs` entry
  # below via `iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_TRINO_CREDENTIAL}`.
  # Sourced from the `trino-polaris-credential` Secret (synced from Vault by
  # ExternalSecrets), formatted as `clientId:clientSecret` in one string.
  # Rotates independently of the Keycloak `trino` client secret.
  - name: POLARIS_TRINO_CREDENTIAL
    valueFrom:
      secretKeyRef:
        name: trino-polaris-credential
        key: credential

# additionalCatalogs: set per-env in values-{env}.yaml (gcs.project-id varies)
#
# serviceAccount: also set per-env (WI annotation references the env's GSA,
# `trino-sa@openvelox-<env>-01.iam.gserviceaccount.com`). See values-prod.tmpl.yaml
# for why Trino uses Workload Identity directly for GCS rather than Polaris-vended
# tokens.

coordinator:
  jvm:
    maxHeapSize: "1G"
  config:
    nodeScheduler:
      includeCoordinator: true
    query:
      maxMemoryPerNode: "512MB"
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 12
  nodeSelector:
    cloud.google.com/gke-nodepool: spot-pool
  tolerations:
    - key: cloud.google.com/gke-spot
      operator: Equal
      value: "true"
      effect: NoSchedule
