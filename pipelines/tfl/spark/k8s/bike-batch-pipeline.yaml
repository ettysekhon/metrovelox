# Batch bike pipeline: three SparkApplication resources for the full raw→curated→analytics flow.
#
# Each job uses Polaris REST catalog with three warehouses (raw, curated, analytics).
# Apply all three (they run sequentially via Airflow DAG orchestration):
#   kubectl apply -f pipelines/tfl/spark/k8s/bike-batch-pipeline.yaml
#
# Or apply individually by label:
#   kubectl apply -f pipelines/tfl/spark/k8s/bike-batch-pipeline.yaml -l app=bike-raw-ingest
# -------------------------------------------------------------------
# 1) bike-raw-ingest: GCS landing Parquet → raw.cycling.bike_occupancy
# -------------------------------------------------------------------
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: bike-raw-ingest
  namespace: batch
  labels:
    app: bike-raw-ingest
    pipeline: batch-bike
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/scripts/bike_raw_ingest.py
  sparkVersion: "4.1.0"
  sparkConf:
    spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    # --- raw catalog ---
    spark.sql.catalog.raw: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.raw.type: rest
    spark.sql.catalog.raw.uri: http://polaris.data.svc.cluster.local:8181/api/catalog
    spark.sql.catalog.raw.warehouse: raw
    spark.sql.catalog.raw.credential: root:polaris-root-secret
    spark.sql.catalog.raw.scope: PRINCIPAL_ROLE:ALL
    spark.sql.catalog.raw.token-refresh-enabled: "true"
    spark.sql.catalog.raw.io-impl: org.apache.iceberg.hadoop.HadoopFileIO
    # --- curated catalog ---
    spark.sql.catalog.curated: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.curated.type: rest
    spark.sql.catalog.curated.uri: http://polaris.data.svc.cluster.local:8181/api/catalog
    spark.sql.catalog.curated.warehouse: curated
    spark.sql.catalog.curated.credential: root:polaris-root-secret
    spark.sql.catalog.curated.scope: PRINCIPAL_ROLE:ALL
    spark.sql.catalog.curated.token-refresh-enabled: "true"
    spark.sql.catalog.curated.io-impl: org.apache.iceberg.hadoop.HadoopFileIO
    # --- analytics catalog ---
    spark.sql.catalog.analytics: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.analytics.type: rest
    spark.sql.catalog.analytics.uri: http://polaris.data.svc.cluster.local:8181/api/catalog
    spark.sql.catalog.analytics.warehouse: analytics
    spark.sql.catalog.analytics.credential: root:polaris-root-secret
    spark.sql.catalog.analytics.scope: PRINCIPAL_ROLE:ALL
    spark.sql.catalog.analytics.token-refresh-enabled: "true"
    spark.sql.catalog.analytics.io-impl: org.apache.iceberg.hadoop.HadoopFileIO
    # --- common ---
    spark.sql.defaultCatalog: raw
    spark.jars.packages: org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.0,com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.25
    spark.jars.ivy: /tmp/.ivy2
    spark.hadoop.fs.gs.impl: com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
    spark.hadoop.google.cloud.auth.type: APPLICATION_DEFAULT
  driver:
    cores: 1
    memory: "1g"
    serviceAccount: spark
    labels:
      app: bike-raw-ingest
    tolerations:
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
        effect: NoSchedule
    configMaps:
      - name: bike-raw-ingest-script
        path: /opt/spark/scripts
  executor:
    cores: 1
    instances: 1
    memory: "1g"
    serviceAccount: spark
    labels:
      app: bike-raw-ingest
    tolerations:
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
        effect: NoSchedule
  restartPolicy:
    type: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bike-raw-ingest-script
  namespace: batch
data:
  bike_raw_ingest.py: |
    """Batch ingest: read landing Parquet from GCS, write to raw.cycling.bike_occupancy Iceberg table."""
    import os
    from pyspark.sql import SparkSession
    from pyspark.sql import functions as F

    bucket = os.environ["GCS_BUCKET"]
    landing_path = f"gs://{bucket}/landing/cycling/bike_points/"

    spark = SparkSession.builder.appName("openvelox-bike-raw-ingest").getOrCreate()

    df = spark.read.parquet(landing_path)
    df = df.withColumn("event_time", F.to_timestamp("event_time"))
    df = df.withColumn("ingested_at", F.to_timestamp("ingested_at"))

    df.writeTo("raw.cycling.bike_occupancy").using("iceberg").createOrReplace()

    row_count = df.count()
    print(f"OK — wrote {row_count} rows to raw.cycling.bike_occupancy from {landing_path}")
    spark.stop()
---
