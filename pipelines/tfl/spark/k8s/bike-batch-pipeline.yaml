apiVersion: v1
kind: ConfigMap
metadata:
  name: bike-analytics-aggregate-script
  namespace: batch
data:
  bike_analytics_aggregate.py: |
    """Analytics aggregation: curated.cycling.bike_occupancy → analytics.cycling.bike_station_hourly.

    Hourly windowed aggregation per bike station — same schema as the Flink
    analytics/aggregations.sql streaming job but executed as a batch Spark job.
    """
    from pyspark.sql import SparkSession
    from pyspark.sql import functions as F

    spark = SparkSession.builder.appName("openvelox-bike-analytics-aggregate").getOrCreate()

    curated = spark.table("curated.cycling.bike_occupancy")

    hourly = (
        curated
        .withColumn("window_start", F.date_trunc("hour", F.col("event_time")))
        .groupBy("bike_point_id", "common_name", "window_start")
        .agg(
            F.round(F.avg(F.col("nb_bikes").cast("double")), 1).alias("avg_bikes"),
            F.round(F.avg(F.col("nb_ebikes").cast("double")), 1).alias("avg_ebikes"),
            F.round(F.avg("occupancy_pct"), 1).alias("avg_occupancy_pct"),
            F.min("nb_bikes").alias("min_bikes"),
            F.max("nb_bikes").alias("max_bikes"),
            F.sum(F.when(F.col("is_empty"), 1).otherwise(0)).alias("empty_count"),
            F.sum(F.when(F.col("is_full"), 1).otherwise(0)).alias("full_count"),
            F.count("*").alias("sample_count"),
        )
        .withColumn("window_end", F.col("window_start") + F.expr("INTERVAL 1 HOUR"))
    )

    hourly.writeTo("analytics.cycling.bike_station_hourly").using("iceberg").createOrReplace()
    print(f"OK — wrote {hourly.count()} rows to analytics.cycling.bike_station_hourly")
    spark.stop()
