apiVersion: v1
kind: ConfigMap
metadata:
  name: bike-curated-transform-script
  namespace: batch
data:
  bike_curated_transform.py: |
    """Curated transform: raw.cycling.bike_occupancy → curated.cycling.bike_occupancy.

    Applies data quality filters and computes occupancy_pct, is_empty, is_full —
    same logic as the Flink curated/transform.sql streaming job.
    """
    from pyspark.sql import SparkSession
    from pyspark.sql import functions as F

    spark = SparkSession.builder.appName("openvelox-bike-curated-transform").getOrCreate()

    raw = spark.table("raw.cycling.bike_occupancy")

    curated = raw.filter(
        F.col("bike_point_id").isNotNull()
        & F.col("lat").between(51.28, 51.69)
        & F.col("lon").between(-0.51, 0.33)
        & (F.col("nb_bikes") >= 0)
        & (F.col("nb_docks") > 0)
    ).select(
        "bike_point_id", "common_name", "lat", "lon",
        "nb_bikes", "nb_ebikes", "nb_empty_docks", "nb_docks",
        F.round(
            (F.col("nb_bikes") + F.col("nb_ebikes")) * 100.0 / F.col("nb_docks"), 1
        ).alias("occupancy_pct"),
        ((F.col("nb_bikes") + F.col("nb_ebikes")) == 0).alias("is_empty"),
        (F.col("nb_empty_docks") == 0).alias("is_full"),
        F.col("event_time"),
        F.current_timestamp().alias("processed_at"),
    )

    curated.writeTo("curated.cycling.bike_occupancy").using("iceberg").createOrReplace()
    print(f"OK — wrote {curated.count()} rows to curated.cycling.bike_occupancy")
    spark.stop()
